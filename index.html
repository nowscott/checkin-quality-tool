<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打卡质检数据生成</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">LOCAL QUALITY CHECK</p>
      <h1>打卡质检数据生成</h1>
      <p class="subtitle">上传课堂反馈名单与聊天导出数据，在浏览器本地完成清洗、匹配并生成可追溯的多 Sheet Excel。文件不会上传服务器。</p>
    </header>

    <section class="card">
      <form id="process-form">
        <div class="grid">
          <label class="upload">
            <span class="step">01</span>
            <strong>课堂反馈质检名单</strong>
            <small>包含老师姓名、学员姓名、老师邮箱和课次信息</small>
            <input id="list-file" name="list_file" type="file" accept=".xlsx" required>
            <span class="file-name" id="list-name">选择 Excel 文件</span>
          </label>
          <label class="upload">
            <span class="step">02</span>
            <strong>聊天质检明细</strong>
            <small>包含聊天类型、发送方、邮箱、群名和聊天内容</small>
            <input id="chat-file" name="chat_file" type="file" accept=".xlsx" required>
            <span class="file-name" id="chat-name">选择 Excel 文件</span>
          </label>
        </div>

        <div class="options">
          <label>
            <span>服务周标记</span>
            <input id="week-label" name="week_label" type="text" placeholder="例如：第六周">
          </label>
          <label class="switch-row">
            <span>
              <strong>启用末字弱匹配</strong>
              <small>后两字未命中时，再用学员名最后一个字匹配</small>
            </span>
            <input id="use-single" type="checkbox">
          </label>
        </div>

        <div class="rules">
          <span>自动清洗</span>
          <b>私聊</b><b>无邮箱</b><b>非员工发送</b><b>引用回复</b>
        </div>

        <button id="submit-button" type="submit">
          <span>生成质检结果</span>
          <small>输出打卡终版、匹配明细、清洗后聊天、处理说明</small>
        </button>
      </form>
    </section>

    <section class="status-card" id="status-card" hidden>
      <div class="spinner" id="spinner"></div>
      <div>
        <strong id="status-title">正在处理数据</strong>
        <p id="status-text">大文件需要一些时间，请不要关闭页面。</p>
        <div class="progress-track"><i id="progress-bar"></i></div>
      </div>
    </section>

    <section class="output-grid">
      <article><span>Sheet 1</span><strong>打卡终版</strong><p>每位教师、每位学员保留一个课次，并给出最终发送判定。</p></article>
      <article><span>Sheet 2</span><strong>匹配明细</strong><p>记录命中关键词、位置、群名、聊天时间、内容和源行号。</p></article>
      <article><span>Sheet 3</span><strong>清洗后聊天</strong><p>仅保留后续匹配所需字段，移除无关列和无效记录。</p></article>
      <article><span>Sheet 4</span><strong>处理说明</strong><p>记录清洗规则、去重规则、各阶段数量和生成时间。</p></article>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
